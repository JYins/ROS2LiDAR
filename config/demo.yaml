pointcloud_player:
  ros__parameters:
    topic_name: /points_raw
    frame_id: lidar
    publish_rate_hz: 10.0
    cluster_count: 4
    points_per_cluster: 45
    cluster_spread: 0.8
    ground_points: 120
    range_x: 20.0
    range_y: 12.0
    ground_z: -1.4

bev_projection:
  ros__parameters:
    input_topic: /points_raw
    bev_tensor_topic: /bev_tensor
    bev_image_topic: /bev_image
    frame_id: lidar
    x_min: -40.0
    x_max: 40.0
    y_min: -40.0
    y_max: 40.0
    z_min: -3.0
    z_max: 2.0
    resolution: 0.16
    num_height_bins: 8
    preview_normalize_mode: max_bin

cluster_detector:
  ros__parameters:
    input_topic: /points_raw
    cluster_topic: /detections
    frame_id: lidar
    distance_threshold: 1.2
    min_cluster_size: 12
    max_cluster_size: 400
    cluster_z_min: -1.0
    cluster_z_max: 2.0
